services:
  # --- Persistent Shared Database Container ---
  postgres:
    image: postgres:15-alpine
    container_name: job_search_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  # --- Isolated Text Extraction Agent Container ---
  extractor-agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: job_search_extractor
    environment:
      - PYTHONPATH=/app
    ports: ["8005:8005"] 
    env_file: .env
    command: uvicorn agent.extractor:app --host 0.0.0.0 --port 8005

  # --- Central API Gateway ---
  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: job_search_api
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - DB_HOST=postgres
      - AGENT_API_URL=http://extractor-agent:8005/extract-agent
    depends_on:
      postgres: {condition: service_healthy}
      extractor-agent: {condition: service_started}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: