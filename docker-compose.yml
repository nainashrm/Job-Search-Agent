services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  api:
    build: ./api
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  job-search-mcp:
    build: ./mcp-servers/job-search
    ports: ["8001:8001"]
    env_file: .env

  poc-mcp:
    build: ./mcp-servers/poc-finder
    ports: ["8002:8002"]
    env_file: .env

  tracker-mcp:
    build: ./mcp-servers/tracker
    ports: ["8003:8003"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}

  ui:
    build: ./ui
    ports: ["3000:3000"]
    depends_on: [api]
  
  scheduler:
    build: ./scheduler
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      
volumes:
  postgres_data: